<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>متحف الموصل الافتراضي - العرض التفاعلي</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
    
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Tajawal', sans-serif; background-color: #05080c; touch-action: none; }
        
        #ui-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, #152233 0%, #05080c 100%);
            z-index: 100; overflow: hidden;
            transition: opacity 0.8s ease-in-out;
            display: block; 
        }

        #map-content {
            position: absolute; width: 2000px; height: 2000px;
            background-image: 
                linear-gradient(rgba(233, 216, 166, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(233, 216, 166, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            top: 50%; left: 50%; transform: translate(-50%, -50%) scale(1);
            transform-origin: 0 0; cursor: grab;
        }
        #map-content:active { cursor: grabbing; }

        .map-title {
            position: absolute; top: 30px; width: 100%; text-align: center;
            font-size: 38px; font-weight: bold; color: #e9d8a6; z-index: 101; pointer-events: none;
            font-family: 'Amiri', serif;
            text-shadow: 0 5px 15px rgba(233, 216, 166, 0.3), 0 2px 5px rgba(0,0,0,0.8);
            background: linear-gradient(90deg, transparent, rgba(5,8,12,0.8), transparent);
            padding: 15px 0;
            letter-spacing: 1px;
        }

        .river-svg {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; opacity: 0.85;
        }

        .map-decoration {
            position: absolute; color: rgba(233, 216, 166, 0.15);
            font-family: 'Amiri', serif; font-size: 45px; pointer-events: none;
            transform: rotate(-15deg); letter-spacing: 5px; font-weight: bold;
        }

        .map-pin {
            position: absolute; display: flex; align-items: center; gap: 12px;
            cursor: pointer; transform: translate(-50%, -50%);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .pin-dot {
            width: 22px; height: 22px; background-color: #ee9b00; border-radius: 50%;
            box-shadow: 0 0 15px #ee9b00, inset 0 0 5px #fff;
            animation: pulse 1.5s infinite; border: 2px solid #fff;
        }

        .pin-label {
            background: rgba(10, 15, 25, 0.9); color: #e9d8a6; padding: 10px 20px;
            border-radius: 30px; border: 1px solid #4a5a6a; font-weight: bold; font-size: 17px;
            white-space: nowrap; box-shadow: 0 5px 15px rgba(0,0,0,0.6); transition: all 0.3s ease;
        }

        .map-pin:hover { transform: translate(-50%, -50%) scale(1.1); z-index: 10; }
        .map-pin:hover .pin-dot { background-color: #fff; box-shadow: 0 0 25px #fff; animation: none; }
        .map-pin:hover .pin-label { background: #e9d8a6; color: #05080c; border-color: #e9d8a6; }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(238, 155, 0, 0.7); }
            70% { box-shadow: 0 0 0 20px rgba(238, 155, 0, 0); }
            100% { box-shadow: 0 0 0 0 rgba(238, 155, 0, 0); }
        }

        #controls-ui {
            position: absolute; top: 20px; left: 20px; right: 20px; z-index: 101;
            display: none; justify-content: space-between; align-items: flex-start; pointer-events: none;
        }
        
        #back-btn {
            padding: 10px 25px; background: rgba(187, 43, 43, 0.95); color: white;
            border: 1px solid #ff4d4d; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 16px; font-family: 'Tajawal', sans-serif;
            pointer-events: all; box-shadow: 0 5px 15px rgba(0,0,0,0.5); transition: background 0.3s;
        }
        #back-btn:hover { background: rgba(220, 30, 30, 1); }
        
        #instructions {
            background: rgba(10, 15, 25, 0.9); color: #e9d8a6; padding: 15px; border-radius: 12px;
            font-size: 15px; text-align: right; pointer-events: none; border: 1px solid #4a5a6a;
            transition: opacity 0.5s ease; opacity: 1; box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }

        #info-panel {
            display: none; position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            width: 85%; max-width: 500px;
            background: rgba(10, 15, 25, 0.95); color: #fff; padding: 25px; border-radius: 15px; border: 1px solid #e9d8a6;
            z-index: 200; text-align: right; box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            animation: fadeIn 0.5s ease-out; font-family: 'Tajawal', sans-serif;
        }
        
        @keyframes fadeIn { from { opacity: 0; bottom: -20px; } to { opacity: 1; bottom: 30px; } }
        #info-title { margin-top: 0; color: #ee9b00; font-size: 26px; font-family: 'Amiri', serif; border-bottom: 1px solid #4a5a6a; padding-bottom: 10px; }
        #info-desc { font-size: 16px; line-height: 1.8; margin-bottom: 20px; color: #e2e8f0; }
        #close-info-btn {
            background: #2c3e50; color: white; border: 1px solid #4a5a6a; font-weight: bold; font-family: 'Tajawal', sans-serif;
            padding: 10px 20px; border-radius: 8px; cursor: pointer; float: left; transition: all 0.2s;
        }
        #close-info-btn:hover { background: #e9d8a6; color: #05080c; }
    </style>

    <script>
        // أداة دوران المجسم وكاميرا الموبايل (نفسها بدون تغيير)
        AFRAME.registerComponent('artifact-rotator', {
            init: function () {
                this.isDragging = false;
                this.previousX = 0;
                this.camera = document.querySelector('#cam');
                
                this.onDown = (e) => {
                    this.isDragging = true;
                    let evt = e.detail && e.detail.mouseEvent ? e.detail.mouseEvent : e;
                    this.previousX = evt.clientX || (evt.touches && evt.touches[0] ? evt.touches[0].clientX : 0);
                    if(this.camera) this.camera.setAttribute('look-controls', 'enabled', false);
                };

                this.onMove = (e) => {
                    if (!this.isDragging) return;
                    let clientX = e.clientX || (e.touches && e.touches[0] ? e.touches[0].clientX : undefined);
                    if(clientX === undefined) return;
                    let deltaX = clientX - this.previousX;
                    this.el.object3D.rotation.y += deltaX * 0.015;
                    this.previousX = clientX;
                };

                this.onUp = () => {
                    if(this.isDragging) {
                        this.isDragging = false;
                        if(this.camera) this.camera.setAttribute('look-controls', 'enabled', true);
                    }
                };

                this.el.addEventListener('mousedown', this.onDown);
                window.addEventListener('mousemove', this.onMove);
                window.addEventListener('mouseup', this.onUp);
                window.addEventListener('touchmove', this.onMove, {passive: true});
                window.addEventListener('touchend', this.onUp);
            },
            tick: function () {
                if (!this.isDragging) {
                    this.el.object3D.rotation.y += 0.005; 
                }
            },
            remove: function () {
                this.el.removeEventListener('mousedown', this.onDown);
                window.removeEventListener('mousemove', this.onMove);
                window.removeEventListener('mouseup', this.onUp);
                window.removeEventListener('touchmove', this.onMove);
                window.removeEventListener('touchend', this.onUp);
                if(this.camera) this.camera.setAttribute('look-controls', 'enabled', true);
            }
        });

        // تحكم المشي والتقريب (نفسه بدون تغيير)
        AFRAME.registerComponent('blender-controls', {
            schema: { speed: {default: 0.015}, zoomSpeed: {default: 0.08} },
            init: function () {
                this.camera = document.querySelector('#cam');
                this.active = false; this.lastX = 0; this.lastY = 0;
                document.addEventListener('contextmenu', e => e.preventDefault());
                
                document.addEventListener('mousedown', (e) => {
                    if (e.button === 2 || e.button === 1) { this.active = true; this.lastX = e.clientX; this.lastY = e.clientY; }
                });
                document.addEventListener('mouseup', () => this.active = false);
                document.addEventListener('mousemove', (e) => {
                    if (!this.active) return;
                    let dx = e.clientX - this.lastX, dy = e.clientY - this.lastY;
                    this.lastX = e.clientX; this.lastY = e.clientY; this.pan(-dx, dy);
                });

                let initialDist = 0;
                document.addEventListener('touchstart', (e) => {
                    if (e.touches.length === 2) {
                        this.active = true;
                        this.lastX = (e.touches[0].clientX + e.touches[1].clientX) / 2;
                        this.lastY = (e.touches[0].clientY + e.touches[1].clientY) / 2;
                        initialDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
                    }
                });
                document.addEventListener('touchmove', (e) => {
                    if (this.active && e.touches.length === 2) {
                        let cx = (e.touches[0].clientX + e.touches[1].clientX) / 2, cy = (e.touches[0].clientY + e.touches[1].clientY) / 2;
                        let dx = cx - this.lastX, dy = cy - this.lastY;
                        this.lastX = cx; this.lastY = cy; 
                        this.pan(-dx, dy); 
                        
                        let currentDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
                        let distDelta = currentDist - initialDist; 
                        initialDist = currentDist; 
                        this.zoom(distDelta * -this.data.zoomSpeed); 
                    }
                });
                document.addEventListener('touchend', () => this.active = false);
                document.addEventListener('wheel', (e) => { this.zoom(e.deltaY * 0.02); });
            },
            pan: function(dx, dy) {
                if (!this.camera) return; let camRot = this.camera.object3D.rotation;
                let v = new THREE.Vector3(dx * this.data.speed, -dy * this.data.speed, 0);
                v.applyEuler(camRot); this.el.object3D.position.add(v);
            },
            zoom: function(dz) {
                if (!this.camera) return; let camRot = this.camera.object3D.rotation;
                let v = new THREE.Vector3(0, 0, dz);
                v.applyEuler(camRot); this.el.object3D.position.add(v);

                let infoPanel = document.getElementById('info-panel');
                let instructions = document.getElementById('instructions');
                if (infoPanel) infoPanel.style.display = 'none';
                if (instructions) instructions.style.opacity = '0';
            }
        });
    </script>
</head>
<body>

    <div id="ui-layer">
        <div class="map-title">متحف نينوى الافتراضي</div>
        
        <div id="map-content">
            <svg class="river-svg" viewBox="0 0 2000 2000" preserveAspectRatio="none">
                <path d="M 1400 -100 C 1300 300, 1600 700, 1000 1100 C 400 1500, 800 1800, 600 2100" 
                      fill="none" stroke="#005f73" stroke-width="35" stroke-linecap="round" 
                      filter="drop-shadow(0 0 20px #0a9396)" opacity="0.6"/>
                <path d="M 1400 -100 C 1300 300, 1600 700, 1000 1100 C 400 1500, 800 1800, 600 2100" 
                      fill="none" stroke="#0a9396" stroke-width="12" stroke-linecap="round" opacity="0.9"/>
            </svg>

            <div class="map-decoration" style="top: 25%; left: 35%; font-size: 80px; opacity: 0.05;">نِينَوَى</div>
            <div class="map-decoration" style="top: 55%; left: 60%; font-size: 50px;">الساحل الأيسر</div>
            <div class="map-decoration" style="top: 40%; left: 15%; font-size: 50px;">الساحل الأيمن</div>

            <div id="pin-site1" class="map-pin" style="top: 45%; left: 65%;" onclick="enterSite('site1')">
                <div class="pin-dot"></div>
                <div class="pin-label">📍 القاعة الرئيسية (6 تحف)</div>
            </div>
            
            <div id="pin-site2" class="map-pin" style="top: 65%; left: 25%;" onclick="enterSite('site2')">
                <div class="pin-dot"></div>
                <div class="pin-label">📍 قاعة الآثار الإسلامية</div>
            </div>
        </div>
    </div>

    <div id="controls-ui">
        <div id="instructions">
            <b>دليل التحكم:</b><br>
            👆 إصبع واحد: التفات في المكان<br>
            ✌️ إصبعين: مشي وزووم للتقريب<br>
            🖱️ اضغط على القطعة لمعرفة تفاصيلها
        </div>
        <button id="back-btn" onclick="exitSite()">العودة للخارطة</button>
    </div>

    <div id="info-panel">
        <h2 id="info-title">عنوان القطعة</h2>
        <p id="info-desc">شرح تفصيلي عن القطعة الأثرية يظهر هنا...</p>
        <button id="close-info-btn" onclick="closeInfoPanel()">إغلاق الشرح</button>
    </div>

    <a-scene id="main-scene" background="color: #1a1a1a" renderer="colorManagement: true;" cursor="rayOrigin: mouse" raycaster="objects: .clickable">
        <a-light type="ambient" color="#bbbbbb"></a-light>
        <a-light type="directional" intensity="1.5" position="1 4 2"></a-light>
        <a-grid material="color: #333" position="0 -0.01 0"></a-grid>

        <a-entity id="cameraRig" position="0 1.6 0" blender-controls>
            <a-camera id="cam" look-controls></a-camera>
        </a-entity>

        <a-entity id="pillars-container"></a-entity>
    </a-scene>

    <script>
        const mapContent = document.getElementById('map-content');
        let scale = 0.5, pointX = -500, pointY = -500, panning = false, start = { x: 0, y: 0 };
        function updateMapTransform() { mapContent.style.transform = `translate(${pointX}px, ${pointY}px) scale(${scale})`; }
        updateMapTransform();
        mapContent.onmousedown = function(e) { e.preventDefault(); panning = true; start = { x: e.clientX - pointX, y: e.clientY - pointY }; };
        window.onmousemove = function(e) { if (!panning) return; pointX = e.clientX - start.x; pointY = e.clientY - start.y; updateMapTransform(); };
        window.onmouseup = function() { panning = false; };
        mapContent.onwheel = function(e) {
            e.preventDefault(); let xs = (e.clientX - pointX) / scale, ys = (e.clientY - pointY) / scale;
            let delta = (e.wheelDelta ? e.wheelDelta : -e.deltaY); (delta > 0) ? (scale *= 1.1) : (scale /= 1.1);
            scale = Math.min(Math.max(0.3, scale), 3); pointX = e.clientX - xs * scale; pointY = e.clientY - ys * scale; updateMapTransform();
        };

        const sitesData = {
            'site1': [ 
                { id: 'p1', model: './models/winged_bull.glb', x: -4, z: -4, scale: '1 1 1', rot: '0 45 0', title: 'الثور المجنح (لاماسو)', desc: 'تمثال ضخم برأس إنسان وجسد ثور وأجنحة نسر. كان يوضع على بوابات المدن لحمايتها من الأرواح الشريرة.' },
                { id: 'p2', model: './models/ashurbanipal.glb', x: 0, z: -6, scale: '1 1 1', rot: '0 0 0', title: 'الملك آشور بانيبال', desc: 'آخر الملوك العظماء للإمبراطورية الآشورية الحديثة. اشتهر بتأسيسه لأول وأعظم مكتبة منظمة في الشرق القديم.' },
                { id: 'p3', model: './models/cuneiform_tablet.glb', x: 4, z: -4, scale: '1 1 1', rot: '0 -45 0', title: 'لوح مسماري', desc: 'لوح طيني نُقش عليه بالكتابة المسمارية، يوثق علوم وقوانين وأدب بلاد الرافدين.' },
                { id: 'p4', model: './models/hassuna_pot.glb', x: 5, z: 2, scale: '1 1 1', rot: '0 90 0', title: 'إناء فخاري - حضارة حسونة', desc: 'يعود هذا الإناء الملون إلى موقع تل حسونة (جنوب الموصل)، ويمثل واحدة من أقدم القرى الزراعية في العالم.' },
                { id: 'p5', model: './models/nimrud_obelisk.glb', x: 0, z: 5, scale: '1 1 1', rot: '0 0 0', title: 'المسلة السوداء', desc: 'مسلة تاريخية تعود للملك شلمنصر الثالث، اكتُشفت في مدينة نمرود توثق انتصارات الملك.' },
                { id: 'p6', model: './models/spring_girl.glb', x: -5, z: 2, scale: '1 1 1', rot: '0 135 0', title: 'تمثال فتاة الربيع', desc: 'أحد الرموز الحديثة لمدينة الموصل، يجسد جمال المدينة التي تُلقب بـ "أم الربيعين".' }
            ],
            'site2': [ 
                { id: 'p7', model: './models/alhadba_minaret.glb', x: -4, z: -4, scale: '1 1 1', rot: '0 0 0', title: 'المنارة الحدباء', desc: 'المعلم الأبرز لمدينة الموصل، بُنيت في القرن الثاني عشر الميلادي وتتميز بميلانها وزخارفها الآجرية الفريدة.' },
                { id: 'p8', model: './models/nuri_mihrab.glb', x: 0, z: -6, scale: '1 1 1', rot: '0 0 0', title: 'محراب الجامع النوري', desc: 'قطعة فنية نادرة من الرخام (الفرش الموصلي) مزينة بآيات قرآنية وزخارف نباتية وهندسية غاية في الدقة.' },
                { id: 'p9', model: './models/mosuli_ewer.glb', x: 4, z: -4, scale: '1 1 1', rot: '0 -45 0', title: 'إبريق نحاسي موصلي', desc: 'تحفة من الصناعات المعدنية الموصلية (القرن الـ 13)، مطعم بالفضة ويحمل نقوشاً تعكس براعة حرفيي الموصل القدماء.' },
                { id: 'p10', model: './models/gold_dinar.glb', x: 5, z: 2, scale: '1 1 1', rot: '0 90 0', title: 'دينار إسلامي', desc: 'عملة نقدية تاريخية ضُربت في مدينة الموصل، تعكس الأهمية الاقتصادية والسياسية للمدينة في العصور الإسلامية.' },
                { id: 'p11', model: './models/bashtabiya.glb', x: 0, z: 5, scale: '1 1 1', rot: '0 0 0', title: 'مجسم قلعة باشطابيا', desc: 'بقايا القلعة التاريخية المطلة على نهر دجلة، والتي صمدت في وجه العديد من الحصارات عبر التاريخ.' },
                { id: 'p12', model: './models/wood_box.glb', x: -5, z: 2, scale: '1 1 1', rot: '0 135 0', title: 'صندوق أتابكي مطعم', desc: 'صندوق أثري من العصر الأتابكي، يعكس دقة الحفر على الخشب وتطعيمه بالصدف والعاج بطريقة احترافية.' }
            ]
        };

        const uiLayer = document.getElementById('ui-layer');
        const controlsUI = document.getElementById('controls-ui');
        const pillarsContainer = document.getElementById('pillars-container');
        const cameraRig = document.getElementById('cameraRig');
        const infoPanel = document.getElementById('info-panel');
        const infoTitle = document.getElementById('info-title');
        const infoDesc = document.getElementById('info-desc');
        
        window.currentRotatingArtifact = null;
        window.currentArtifactOriginalRot = null;

        function enterSite(siteId) {
            uiLayer.style.opacity = '0';
            document.getElementById('instructions').style.opacity = '1'; 
            
            setTimeout(() => {
                uiLayer.style.display = 'none'; 
                uiLayer.style.pointerEvents = 'none'; 
                controlsUI.style.display = 'flex'; 
                spawnPillarsAndArtifacts(sitesData[siteId], siteId); 
            }, 800);
        }

        function spawnPillarsAndArtifacts(data, siteId) {
            pillarsContainer.innerHTML = ''; 
            data.forEach((item, index) => {
                let group = document.createElement('a-entity');
                group.setAttribute('position', `${item.x} -5 ${item.z}`); 

                let pillar = document.createElement('a-cylinder');
                pillar.setAttribute('radius', '0.6'); pillar.setAttribute('height', '1.5'); 
                pillar.setAttribute('color', '#2c3e50');
                pillar.setAttribute('class', 'clickable'); 
                group.appendChild(pillar);

                let artifact;
                if (item.model) {
                    artifact = document.createElement('a-entity');
                    artifact.setAttribute('gltf-model', `url(${item.model})`); 
                    // التعديل الأول: فرض حجم موحد لكل المجسمات
                    artifact.setAttribute('scale', '0.5 0.5 0.5'); 
                    artifact.setAttribute('rotation', item.rot); 
                    // التعديل الثاني: وضعها مباشرة فوق الأسطوانة بارتفاع 0.75
                    artifact.setAttribute('position', '0 0.75 0'); 
                    artifact.setAttribute('class', 'clickable'); 
                    group.appendChild(artifact);
                }

                pillarsContainer.appendChild(group);

                let delay = index * 300; 
                setTimeout(() => { group.setAttribute('animation', `property: position; to: ${item.x} 0.75 ${item.z}; dur: 1500; easing: easeOutElastic`); }, 400 + delay);

                let handleClick = function() {
                    cameraRig.removeAttribute('animation'); 
                    
                    let dist = Math.sqrt(item.x * item.x + item.z * item.z);
                    let ratio = (dist - 2.5) / dist; 
                    let zoomX = item.x * ratio;
                    let zoomZ = item.z * ratio;
                    
                    cameraRig.setAttribute('animation', `property: position; to: ${zoomX} 1.6 ${zoomZ}; dur: 1500; easing: easeOutCubic`);
                    
                    if (window.currentRotatingArtifact && window.currentArtifactOriginalRot) {
                        window.currentRotatingArtifact.removeAttribute('artifact-rotator');
                        window.currentRotatingArtifact.setAttribute('rotation', window.currentArtifactOriginalRot);
                    }
                    
                    if (artifact) {
                        artifact.setAttribute('artifact-rotator', '');
                        window.currentRotatingArtifact = artifact;
                        window.currentArtifactOriginalRot = item.rot;
                    }
                    
                    infoPanel.style.display = 'none';
                    setTimeout(() => {
                        infoTitle.innerText = item.title; infoDesc.innerText = item.desc; infoPanel.style.display = 'block';
                    }, 1200);
                };

                pillar.addEventListener('click', handleClick);
                if(artifact) artifact.addEventListener('click', handleClick);
            });
        }

        function closeInfoPanel() {
            infoPanel.style.display = 'none';
            cameraRig.setAttribute('animation', `property: position; to: 0 1.6 0; dur: 1500; easing: easeOutCubic`);
            
            if (window.currentRotatingArtifact && window.currentArtifactOriginalRot) {
                window.currentRotatingArtifact.removeAttribute('artifact-rotator');
                window.currentRotatingArtifact.setAttribute('rotation', window.currentArtifactOriginalRot);
                window.currentRotatingArtifact = null;
            }
        }

        function exitSite() {
            uiLayer.style.display = 'block'; 
            setTimeout(() => {
                uiLayer.style.opacity = '1'; 
                uiLayer.style.pointerEvents = 'all'; 
            }, 10);
